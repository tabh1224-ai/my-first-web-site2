<!doctype html>
<html lang="ko">
<head>
    <title>R DESIGN | 서든어택 홍보지</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #111;
            color: #f5f5f5;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            color: #c9a96e;
        }

        .site-logo {
            font-size: 60px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
            margin: 0;
            padding: 24px 20px 20px;
            letter-spacing: 4px;
            font-weight: 800;
            background-color: #111;
        }

        /* 상단 메뉴 */
        .menu-wrap {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: nowrap;
            gap: 28px;
            padding: 20px 20px;
            background-color: #151515;
            border-bottom: 1px solid #2a2a2a;
            text-align: center;
            overflow-x: auto;
        }

        .menu-group {
            min-width: auto;
            flex: 0 0 auto;
        }

        .menu-title {
            font-size: 16px;
            color: #fff;
            margin-bottom: 0;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .menu-title a {
            color: white;
            text-decoration: none;
        }

        .menu-title a:hover {
            color: #c9a96e;
        }

        /* 2단 메뉴 기본 숨김 */
        .submenu {
            list-style: none;
            margin: 14px 0 0;
            padding: 0;
            display: none;
        }

        /* 메뉴 전체 영역 hover 시 전부 보이기 */
        .menu-wrap:hover .submenu {
            display: block;
        }

        .submenu li {
            margin: 8px 0;
            white-space: nowrap;
        }

        .submenu li a {
            color: #bbb;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .submenu li a:hover {
            color: #c9a96e;
        }

        .contact-group {
            display: flex;
            align-items: flex-start;
        }

        .page-title {
            text-align: center;
            padding: 60px 20px 10px;
        }

        .page-title h2 {
            margin: 0;
            font-size: 36px;
            font-weight: 800;
            color: #fff;
        }

        .page-title p {
            margin-top: 12px;
            color: #bbb;
            font-size: 16px;
        }

        .portfolio {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto 100px;
        }

        .item {
            background-color: #181818;
            padding: 12px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            transition: 0.35s ease;
        }

        .item:hover {
            transform: translateY(-8px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
        }

        .item img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #c9a96e;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .item img:hover {
            transform: scale(1.02);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.92);
            text-align: center;
            padding: 20px;
        }

        .modal-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 30px;
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content {
            display: block;
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        }

        .close {
            position: absolute;
            top: 12px;
            right: 12px;
            color: white;
            background: rgba(0, 0, 0, 0.45);
            font-size: 22px;
            width: 38px;
            height: 38px;
            line-height: 38px;
            border-radius: 50%;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px 10px;
            border-top: 1px solid #333;
            color: #888;
            font-size: 14px;
            background-color: #111;
        }

        @media (max-width: 1024px) {
            .portfolio {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .site-logo {
                font-size: 38px;
                padding: 18px 16px 16px;
                letter-spacing: 2px;
            }

            .menu-wrap {
                flex-direction: column;
                align-items: center;
                gap: 18px;
                padding: 18px 16px;
                overflow-x: visible;
            }

            .menu-group {
                width: 100%;
            }

            .menu-title {
                font-size: 16px;
            }

            .submenu {
                margin-top: 8px;
                text-align: center;
            }

            .submenu li a {
                font-size: 14px;
            }

            .page-title {
                padding: 40px 20px 0;
            }

            .page-title h2 {
                font-size: 28px;
            }

            .page-title p {
                font-size: 14px;
                line-height: 1.6;
            }

            .portfolio {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
                padding: 20px 14px 60px;
            }

            .item {
                padding: 8px;
                border-radius: 14px;
            }

            footer {
                font-size: 12px;
                padding: 16px 10px;
            }
        }

        @media (max-width: 480px) {
            .portfolio {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <div class="menu-group">

    <script>
        function openModal(img) {
            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modal-img");

            modal.style.display = "block";
            modalImg.src = img.src;
            modalImg.alt = img.alt;
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                closeModal();
            }
        });
    </script>
