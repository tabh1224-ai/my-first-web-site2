<!doctype html>
<html>
<head>
    <title>R DESIGN</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
     a {
        color: white;
        text-decoration: none;
        transition: 0.3s;
     }

     a:hover {
        color: #c9a96e;
     }

     body {
      background-color: #111;
      color: #f5f5f5;
      margin: 0;
     }

     h1 {
        font-size: 60px;
        text-align: center;
        border-bottom: 2px solid #333;
        margin: 0;
        padding: 20px;
     }

     h2 {
      margin-top: 200px;
      margin-left: 40px;
      font-size: 30px;
      color: #ffffff;
     }

     .intro {
      padding-bottom: 100px;
      margin-left: 40px;
      font-size: 30px;
      color: #d6d6d6;
      line-height: 1.7;
     }

     ol {
      border-bottom: 2px solid #333;
      margin: 0;
      padding: 10px;
      text-align: center;
      list-style: none;
     }

     ol > li {
      display: inline-block;
      margin-right: 50px;
      font-size: 20px;
      position: relative;
      z-index: 100;
     }

     .hero{
        position: relative;
        text-align: center;
        width: 100%;
        height: 70vh;
        overflow: hidden;
        z-index: 1;
     }
     
     .hero::before{
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 1;
     }
     
     .hero::after{
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
     }

     .main-img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
      margin: 1px auto;
     }
     
     .hero-text{
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        text-align: center;
        z-index: 2;
     }

     .hero-text h2{
        font-size: 60px;
        font-weight: 700;
        margin: 0;
        text-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
     }

     .hero-text p{
        font-size: 20px;
        margin-top: 10px;
        color: white;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
     }

     /* 드롭다운 메뉴 */
     .submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #1a1a1a;
      border: 1px solid #444;
      padding: 10px 0;
      min-width: 180px;
      list-style: none;
      text-align: left;
      z-index: 9999;
     }

     .submenu li {
      display: block;
      margin: 0;
      padding: 10px 20px;
      white-space: nowrap;
     }

     .submenu li a {
      display: block;
     }

     .dropdown:hover .submenu {
      display: block;
     }

     .submenu li:hover {
      background-color: #222;
     }

     h3 {
        text-align: center;
        display: block;
        padding: 50px;
        padding-bottom: 30px;
        font-size: 30px;
        color: #ffffff;
     }

     .review-img{
        width: 260px;
        gap: 30px;
        padding: 5px;
        border: 2px solid #444;
        border-color: #c9a96e;
        border-radius: 10px;
        transition: 0.3s;
     }

     .review-img:hover{
        transform: scale(1.05);
     }

     .portfolio{
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
     }

     .item{
        text-align: center;
     }

     footer{
        text-align: center;
        padding: 20px 0;
        border-top: 1px solid #333;
        color: #888;
        font-size: 14px;
     }

     @media (max-width: 768px) {
  h1 {
    font-size: 38px;
    padding: 16px;
  }

  ol {
    padding: 12px 10px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  ol > li {
    display: inline-block;
    margin: 0 12px;
    font-size: 16px;
  }

  .submenu {
    min-width: 150px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .hero {
    height: 45vh;
  }

  .main-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    margin: 0;
  }

  .hero-text {
    width: 90%;
  }

  .hero-text h2 {
    font-size: 36px;
  }

  .hero-text p {
    font-size: 14px;
    line-height: 1.5;
  }

  h3 {
    font-size: 24px;
    padding: 35px 20px 20px 20px;
  }

  .portfolio {
    gap: 14px;
    padding: 0 14px;
  }

  .review-img {
    width: 42vw;
    max-width: 180px;
    padding: 4px;
  }

  footer {
    font-size: 12px;
    padding: 16px 10px;
  }
}
     
    </style>
