    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #111;
            color: #f5f5f5;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            color: #c9a96e;
        }

        /* 상단 로고 */
        h1 {
            font-size: 60px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
            margin: 0;
            padding: 24px 20px 20px;
            letter-spacing: 4px;
            font-weight: 800;
            background-color: #111;
        }

        /* 상단 메뉴 */
        ol {
            border-bottom: 1px solid #2a2a2a;
            margin: 0;
            padding: 14px 10px;
            text-align: center;
            list-style: none;
            background-color: #151515;
        }

        ol > li {
            display: inline-block;
            margin: 0 24px;
            font-size: 18px;
            position: relative;
            z-index: 100;
        }

        ol > li > a,
        ol > li > strong,
        ol > li > a strong {
            letter-spacing: 1px;
        }

        ol > li > a {
            position: relative;
            display: inline-block;
            padding-bottom: 4px;
        }

        ol > li > a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0;
            height: 1px;
            background-color: #c9a96e;
            transition: width 0.3s ease;
        }

        ol > li > a:hover::after {
            width: 100%;
        }

        /* 메인 히어로 */
        .hero {
            position: relative;
            text-align: center;
            width: 100%;
            height: 70vh;
            overflow: hidden;
            z-index: 1;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            margin: 0;
            transform: scale(1.02);
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 2;
            width: 90%;
            max-width: 900px;
            animation: fadeUp 1s ease;
        }

        .hero-text h2 {
            font-size: 60px;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            letter-spacing: -1px;
        }

        .hero-text p {
            font-size: 20px;
            margin-top: 16px;
            color: white;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
            line-height: 1.7;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 28px;
            padding: 13px 30px;
            border: 1px solid #c9a96e;
            border-radius: 999px;
            background-color: rgba(201, 169, 110, 0.12);
            color: white;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .contact-btn:hover {
            background-color: #c9a96e;
            color: #111;
            transform: translateY(-2px);
        }

        /* 드롭다운 */
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #1a1a1a;
            border: 1px solid #444;
            padding: 10px 0;
            min-width: 190px;
            list-style: none;
            text-align: left;
            z-index: 9999;
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
        }

        .submenu li {
            display: block;
            margin: 0;
            padding: 10px 20px;
            white-space: nowrap;
        }

        .submenu li a {
            display: block;
        }

        .dropdown:hover .submenu {
            display: block;
        }

        .submenu li:hover {
            background-color: #222;
        }

        /* 후기 타이틀 */
        h3 {
            text-align: center;
            display: block;
            padding: 70px 20px 30px;
            font-size: 32px;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin: 0;
        }

        /* 후기 카드 */
        .portfolio {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            padding: 0 20px 40px;
            margin-bottom: 120px;
        }

        .item {
            text-align: center;
            background-color: #181818;
            padding: 12px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            transition: 0.35s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .item.show {
            opacity: 1;
            transform: translateY(0);
        }

        .item:hover {
            transform: translateY(-8px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
        }

        .review-img {
            width: 260px;
            display: block;
            padding: 5px;
            border: 1px solid #c9a96e;
            border-radius: 12px;
            transition: 0.3s;
        }

        .review-img:hover {
            transform: scale(1.03);
        }

        footer {
            text-align: center;
            padding: 20px 10px;
            border-top: 1px solid #333;
            color: #888;
            font-size: 14px;
            background-color: #111;
        }

        /* 애니메이션 */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* 모바일 */
        @media (max-width: 768px) {
            h1 {
                font-size: 38px;
                padding: 18px 16px 16px;
                letter-spacing: 2px;
            }

            ol {
                padding: 12px 10px;
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 14px;
            }

            ol > li {
                display: inline-block;
                margin: 0 8px;
                font-size: 16px;
            }

            .submenu {
                min-width: 150px;
                left: 50%;
                transform: translateX(-50%);
                text-align: center;
            }

            .hero {
                height: 48vh;
            }

            .hero-text h2 {
                font-size: 34px;
                line-height: 1.3;
            }

            .hero-text p {
                font-size: 14px;
                line-height: 1.7;
                margin-top: 12px;
            }

            .contact-btn {
                margin-top: 20px;
                padding: 11px 24px;
                font-size: 14px;
            }

            h3 {
                font-size: 24px;
                padding: 45px 20px 20px;
            }

            .portfolio {
                gap: 14px;
                padding: 0 14px 20px;
                margin-bottom: 80px;
            }

            .review-img {
                width: 42vw;
                max-width: 180px;
                padding: 4px;
            }

            footer {
                font-size: 12px;
                padding: 16px 10px;
            }
        }
    </style>

    <!-- 스크롤 등장 효과 -->
    <script>
        const items = document.querySelectorAll('.item');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('show');
                    }, index * 120);
                }
            });
        }, {
            threshold: 0.15
        });

        items.forEach(item => observer.observe(item));
    </script>
