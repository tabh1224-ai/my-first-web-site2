<!doctype html>

<head>
    <title>R DESIGN | 방송 디자인</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
background-color:#111;
color:#f5f5f5;
margin:0;
font-family:'Noto Sans KR',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
}

a{
color:white;
text-decoration:none;
transition:0.3s;
}

a:hover{color:#c9a96e;}

.site-logo{
font-size:60px;
text-align:center;
border-bottom:1px solid #2a2a2a;
margin:0;
padding:24px 20px 20px;
letter-spacing:4px;
font-weight:800;
background-color:#111;
}

/* 메뉴 */

.menu-wrap{
display:flex;
justify-content:center;
align-items:flex-start;
flex-wrap:nowrap;
gap:28px;
padding:20px;
background:#151515;
border-bottom:1px solid #2a2a2a;
text-align:center;
overflow-x:auto;
}

.menu-group{flex:0 0 auto;}

.menu-title{
font-size:16px;
color:#fff;
white-space:nowrap;
}

.submenu{
list-style:none;
margin:14px 0 0;
padding:0;
display:none;
}

.menu-wrap:hover .submenu{display:block;}

.submenu li{margin:8px 0;}

.submenu li a{
color:#bbb;
font-size:14px;
}

.submenu li a:hover{color:#c9a96e;}

.page-title{
text-align:center;
padding:60px 20px 10px;
}

.page-title h2{
margin:0;
font-size:36px;
font-weight:800;
}

.page-title p{
margin-top:12px;
color:#bbb;
font-size:16px;
}

/* 포트폴리오 */

.portfolio{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
padding:40px;
max-width:1400px;
margin:0 auto 100px;
}

.item{
background:#181818;
padding:12px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,0.25);
transition:.35s;
}

.item:hover{
transform:translateY(-8px);
box-shadow:0 14px 30px rgba(0,0,0,0.35);
}

.item img{
width:100%;
border:1px solid #c9a96e;
border-radius:12px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
z-index:9999;
inset:0;
background:rgba(0,0,0,0.92);
text-align:center;
padding:20px;
}

.modal-wrapper{
position:relative;
display:inline-block;
margin-top:30px;
max-width:90vw;
max-height:90vh;
}

.modal-content{
max-width:90vw;
max-height:90vh;
border-radius:12px;
}

.close{
position:absolute;
top:12px;
right:12px;
color:white;
background:rgba(0,0,0,0.45);
font-size:22px;
width:38px;
height:38px;
line-height:38px;
border-radius:50%;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #333;
color:#888;
font-size:14px;
background:#111;
margin-top:auto;
}

@media (max-width:1024px){
.portfolio{grid-template-columns:repeat(3,1fr);}
}

@media (max-width:768px){

.site-logo{font-size:38px;}

.menu-wrap{
flex-direction:column;
align-items:center;
gap:18px;
overflow-x:visible;
}

.portfolio{
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:20px;
}

}

@media (max-width:480px){
.portfolio{grid-template-columns:1fr;}
}

</style>
</head>

<body>

</div>

</div>

<h2>방송 디자인</h2>
<p>클릭하면 이미지를 크게 볼 수 있습니다.</p>

<div class="portfolio">

<div class="item">
<img src="방송1.gif" onclick="openModal(this)">
</div>

<div class="item">
<img src="방송2.jpg" onclick="openModal(this)">
</div>

<div class="item">
<img src="방송3.jpg" onclick="openModal(this)">
</div>

<div class="item">
<img src="방송4.png" onclick="openModal(this)">
</div>

</div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-wrapper" onclick="event.stopPropagation()">
<img class="modal-content" id="modal-img">
<span class="close" onclick="closeModal()">&times;</span>
</div>
</div>

</footer>

<script>

function openModal(img){
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modal-img");

modal.style.display="block";
modalImg.src=img.src;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

document.addEventListener("keydown",function(e){
if(e.key==="Escape"){
closeModal();
}
});

</script>
